<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Livery — Legacy Équestre</title>
  <link rel="stylesheet" href="track.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="track-container">
    <div class="track-brand">
      <span class="horse-badge"><span class="running-horse">🐎</span></span>
      <span class="track-brand-name">LEGACY</span>
      <span class="track-brand-sub">École Équestre</span>
    </div>

    <div class="track-card" id="liveryCard">
      <p class="loading-text" id="loadingText">Loading your livery details...</p>
    </div>

    <div class="track-card" id="logCard" style="display:none; margin-top:18px; text-align:left;">
      <h3 style="font-family:'Playfair Display',serif; color:#2c1a0e; margin-bottom:10px; text-align:center;">📋 Daily Care Log</h3>
      <div id="dayLogGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; max-height:340px; overflow-y:auto;"></div>
    </div>

    <div class="track-card" id="renewalCard" style="display:none; margin-top:18px;">
      <p class="refund-note" id="renewalNote"></p>
      <button class="btn-refund-request" id="renewalButton" onclick="requestRenewal()">Request Renewal</button>
    </div>
  </div>

  <div id="dayDetailOverlay" style="display:none; position:fixed; inset:0; background:rgba(26,10,0,0.55); align-items:center; justify-content:center; z-index:999; padding:20px;">
    <div style="background:#fdf8f3; border-radius:18px; padding:28px 26px; max-width:380px; width:100%; position:relative; box-shadow:0 20px 50px rgba(0,0,0,0.3);">
      <button onclick="closeDayDetail()" style="position:absolute; top:14px; right:16px; background:none; border:none; font-size:1.1rem; cursor:pointer; color:#888;">✕</button>
      <h3 id="dayDetailDate" style="font-family:'Playfair Display',serif; color:#2c1a0e; margin-bottom:4px;"></h3>
      <p id="dayDetailDayNum" style="color:#a07840; font-weight:600; font-size:0.85rem; margin-bottom:16px;"></p>
      <p id="dayDetailNote" style="color:#444; line-height:1.7; font-size:0.95rem;"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function loadLivery() {
      const card = document.getElementById('liveryCard');
      if (!token) {
        card.innerHTML = '<p class="error-text">No tracking token provided.</p>';
        return;
      }
      try {
        const res = await fetch(`/api/livery/track/${token}`);
        if (!res.ok) {
          card.innerHTML = '<p class="error-text">Livery booking not found.</p>';
          return;
        }
        const booking = await res.json();
        renderLivery(booking);
      } catch (err) {
        card.innerHTML = '<p class="error-text">Something went wrong loading your livery details.</p>';
      }
    }

    function renderLivery(booking) {
      const card = document.getElementById('liveryCard');
      let statusBannerClass = 'pending-banner';
      let statusText = '⏳ Pending Review';
      if (booking.approvalStatus === 'AwaitingHorse') { statusBannerClass = 'pending-banner'; statusText = '✅ Approved — Awaiting Horse Arrival'; }
      if (booking.approvalStatus === 'Active') { statusBannerClass = 'approved-banner'; statusText = '✅ Active'; }
      if (booking.approvalStatus === 'Rejected') { statusBannerClass = 'rejected-banner'; statusText = '❌ Not Approved'; }

      let html = `
        <h2>Full Livery</h2>
        <p class="package-name">🐴 ${escapeHtml(booking.horseName)}</p>
        <div class="status-banner ${statusBannerClass}">${statusText}</div>
        <p style="color:#555; margin-bottom:6px;">💰 AED ${booking.price} / month</p>
      `;

      if (booking.approvalStatus === 'AwaitingHorse') {
        html += `<p style="color:#555; margin-bottom:6px;">📅 Preferred Drop-off Date: ${booking.preferredDate ? new Date(booking.preferredDate + 'T00:00:00').toLocaleDateString() : '-'}</p>`;
        html += `<p style="color:#a07840; font-size:0.85rem; margin-top:10px;">Your request has been approved! Please bring ${escapeHtml(booking.horseName)} to the academy. Your 30-day period will officially start once our team confirms arrival.</p>`;
      }

      if (booking.approvalStatus === 'Active') {
        html += `<p style="color:#555; margin-bottom:6px;">📅 Started: ${new Date(booking.startDate).toLocaleDateString()}</p>`;
        html += `<p style="color:#555; margin-bottom:6px;">📅 Expires: ${new Date(booking.endDate).toLocaleDateString()}</p>`;
        if (booking.daysRemaining !== null) {
          const urgent = booking.daysRemaining <= 7;
          html += `<p style="font-weight:700; font-size:1.1rem; color:${urgent ? '#a71d2a' : '#1e7e34'}; margin:14px 0;">${booking.daysRemaining} day(s) remaining</p>`;
          if (urgent) {
            html += `<p style="color:#a71d2a; font-size:0.85rem;">⚠️ Your livery is expiring soon. Please renew to keep your slot.</p>`;
          }
        }
      }

      if (booking.approvalStatus === 'Rejected') {
        html += `<p style="color:#888; font-size:0.9rem; margin-top:10px;">Please contact us directly for more information.</p>`;
      }

      card.innerHTML = html;

      if (booking.approvalStatus === 'Active' && booking.dailyLog && booking.dailyLog.length) {
        document.getElementById('logCard').style.display = 'block';
        window._dailyLog = booking.dailyLog; // cache for popup lookup
        document.getElementById('dayLogGrid').innerHTML = booking.dailyLog.map(d => {
          const dateLabel = d.date ? formatDayLabel(d.date) : `Day ${d.dayNumber}`;
          return `
          <div onclick="openDayDetail(${d.dayNumber})" style="cursor:pointer; border:1px solid ${d.note ? '#9fd8ab' : '#eee'}; background:${d.note ? '#f4fbf5' : '#fafafa'}; border-radius:8px; padding:10px 6px; font-size:0.78rem; text-align:center; transition: box-shadow 0.2s;">
            <strong style="display:block; color:#2c1a0e;">${dateLabel}</strong>
            <span style="color:#999; font-size:0.68rem;">Day ${d.dayNumber}</span>
            ${d.note ? '<div style="margin-top:3px; color:#1e7e34; font-size:0.68rem;">✓ Logged</div>' : '<div style="margin-top:3px; color:#bbb; font-size:0.68rem;">No entry</div>'}
          </div>`;
        }).join('');
      }

      if (booking.approvalStatus === 'Active' && booking.daysRemaining !== null && booking.daysRemaining <= 7) {
        document.getElementById('renewalCard').style.display = 'block';
        if (booking.renewalRequested) {
          document.getElementById('renewalNote').textContent = '✅ Your renewal request has been submitted. Our team will follow up shortly.';
          document.getElementById('renewalButton').style.display = 'none';
        } else {
          document.getElementById('renewalNote').textContent = 'Your livery is expiring soon. Request a renewal to keep your slot.';
        }
      }
    }

    async function requestRenewal() {
      try {
        const res = await fetch(`/api/livery/track/${token}`);
        const booking = await res.json();
        await fetch(`/api/livery/${booking._id}/request-renewal`, { method: 'POST' });
        loadLivery();
      } catch (err) {
        alert('Could not submit renewal request. Please contact us directly.');
      }
    }

    function formatDayLabel(isoDate) {
      const d = new Date(isoDate + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function openDayDetail(dayNumber) {
      const entry = (window._dailyLog || []).find(d => d.dayNumber === dayNumber);
      if (!entry) return;

      document.getElementById('dayDetailDate').textContent = entry.date
        ? new Date(entry.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })
        : `Day ${dayNumber}`;
      document.getElementById('dayDetailDayNum').textContent = `Day ${dayNumber} of 30`;
      document.getElementById('dayDetailNote').innerHTML = entry.note
        ? escapeHtml(entry.note)
        : '<em style="color:#bbb;">No care log entry has been added for this day yet.</em>';

      document.getElementById('dayDetailOverlay').style.display = 'flex';
    }

    function closeDayDetail() {
      document.getElementById('dayDetailOverlay').style.display = 'none';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    loadLivery();
  </script>
</body>
</html>
